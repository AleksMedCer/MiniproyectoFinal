name: Laravel CI/CD

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build y pruebas Laravel
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, pdo_mysql
          coverage: none

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependencias Composer
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Instalar dependencias Node
        run: npm ci

      - name: Configurar entorno
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Ejecutar build
        run: npm run build

      - name: Configurar SQLite para pruebas
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Ejecutar migraciones
        run: php artisan migrate --force

      - name: Ejecutar seeders
        run: php artisan db:seed --force

      - name: Ejecutar pruebas automáticas
        run: php artisan test

  deploy:
    name: Despliegue cloud
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Disparar despliegue automatico
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::error::Configura el secreto DEPLOY_HOOK_URL en GitHub Actions."
            exit 1
          fi

          curl --fail --request POST "$DEPLOY_HOOK_URL"
